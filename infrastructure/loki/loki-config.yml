# ══════════════════════════════════════════════════════════════
# Loki — Log Aggregation Configuration
# Deployment: single binary (monolithic mode)
# Storage:    local filesystem  /loki/chunks + /loki/index
#
# Retention: 30 days (logs_dir is a named Docker volume)
#
# Why single binary?
#   The platform runs on a single EC2 host. Monolithic mode has
#   no inter-component network overhead and is trivially operated.
#   Migrating to scalable mode (read/write/backend split) requires
#   only changing the target and adding object storage — same config
#   structure, no log pipeline changes.
#
# Push endpoint:  http://loki:3100/loki/api/v1/push  (Promtail → Loki)
# Query endpoint: http://loki:3100  (Grafana data source)
# ══════════════════════════════════════════════════════════════

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

# ── Common (shared across all components in monolithic mode) ──
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ── Query range ───────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# ── Schema ────────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store:    tsdb
      object_store: filesystem
      schema:   v13
      index:
        prefix: index_
        period: 24h

# ── Ruler (alerting — disabled in dev) ───────────────────────
ruler:
  alertmanager_url: http://localhost:9093

# ── Ingester ─────────────────────────────────────────────────
ingester:
  wal:
    enabled: true
    dir: /loki/wal
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period:      1h
  chunk_retain_period:    30s
  chunk_target_size:      1536000   # ~1.5 MB per chunk
  max_chunk_age:          1h

# ── Storage config ────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# ── Compactor — handles retention ────────────────────────────
compactor:
  working_directory:       /loki/compactor
  compaction_interval:     10m
  retention_enabled:       true
  retention_delete_delay:  2h
  retention_delete_worker_count: 150
  delete_request_store:    filesystem

# ── Limits ───────────────────────────────────────────────────
limits_config:
  # 30-day retention for all streams
  retention_period: 720h

  # Ingest rate limits (generous for a single-host deployment)
  ingestion_rate_mb:           16
  ingestion_burst_size_mb:     32
  per_stream_rate_limit:       5MB
  per_stream_rate_limit_burst: 15MB

  # Query limits
  max_query_lookback:          720h
  max_query_length:            721h
  max_entries_limit_per_query: 50000

  # Label limits (prevent cardinality explosion)
  max_label_names_per_series:  30
  max_label_value_length:      2048

  # Reject logs with timestamps too far in the past or future
  reject_old_samples:          true
  reject_old_samples_max_age:  72h
  creation_grace_period:       10m

# ── Chunk store ───────────────────────────────────────────────
chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled:    true
      max_size_mb: 256

# ── Table manager (not needed for filesystem, but avoids warnings) ─
table_manager:
  retention_deletes_enabled: true
  retention_period:          720h

# ── Frontend ──────────────────────────────────────────────────
frontend:
  max_outstanding_per_tenant: 256
  compress_responses: true
