# ══════════════════════════════════════════════════════════════
# Cloudflare — Real-IP Restoration & Origin Authentication
#
# WHY THIS FILE EXISTS
# ─────────────────────
# When Cloudflare proxies a request, nginx sees the source IP as
# a Cloudflare edge node, not the visitor. Without this config:
#
#   1. Rate limiting zones key on $binary_remote_addr — one CF
#      edge node IP covers millions of end users, so rate limits
#      are either useless (too low = whole CF range gets blocked)
#      or pointless (too high = individual users never throttled).
#
#   2. Application logs show CF IPs instead of visitor IPs,
#      making security investigations impossible.
#
#   3. IP-based fraud detection in the API sees CF IPs.
#
# ngx_http_realip_module restores the real visitor IP from the
# CF-Connecting-IP header, but ONLY trusts that header from
# Cloudflare's own IP ranges. A direct attacker spoofing the
# header is rejected because their IP isn't in the trusted list.
#
# CLOUDFLARE ORIGIN PULL AUTHENTICATION
# ──────────────────────────────────────
# The geo block below maps every non-Cloudflare IP to
# $cloudflare_ip = 0. Server blocks enforce:
#   if ($cloudflare_ip = 0) { return 403; }
#
# This means direct-to-origin requests (bypassing Cloudflare)
# are blocked. Pair with Cloudflare's "Authenticated Origin Pulls"
# feature (mTLS) for a cryptographic guarantee.
#
# SOURCE: https://www.cloudflare.com/ips/  (last updated 2024-12)
# Regenerate with: curl https://www.cloudflare.com/ips-v4 and ips-v6
# ══════════════════════════════════════════════════════════════

# ── Trust CF-Connecting-IP only from Cloudflare ranges ────────
# real_ip_header:   which header carries the real client IP
# real_ip_recursive: strip any IPs we also trust from the right
#                    of X-Forwarded-For before recording

real_ip_header     CF-Connecting-IP;
real_ip_recursive  on;

# ── Cloudflare IPv4 egress ranges ─────────────────────────────
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;

# ── Cloudflare IPv6 egress ranges ─────────────────────────────
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# ── Geo block: identify non-Cloudflare IPs ────────────────────
# $cloudflare_ip = 1 means "traffic arrived via Cloudflare"
# $cloudflare_ip = 0 means "direct access — block at server block level"
#
# 0.0.0.0/0 is the default (all IPs → 0 = not Cloudflare).
# Each CF range overrides to 1.
# This is evaluated AFTER set_real_ip_from restores the real IP,
# so a spoofed CF-Connecting-IP from a non-CF IP is not trusted.
geo $cloudflare_ip {
    default 0;

    # Cloudflare IPv4
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    108.162.192.0/18 1;
    131.0.72.0/22    1;
    141.101.64.0/18  1;
    162.158.0.0/15   1;
    172.64.0.0/13    1;
    173.245.48.0/20  1;
    188.114.96.0/20  1;
    190.93.240.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;

    # Cloudflare IPv6
    2400:cb00::/32   1;
    2606:4700::/32   1;
    2803:f800::/32   1;
    2405:b500::/32   1;
    2405:8100::/32   1;
    2a06:98c0::/29   1;
    2c0f:f248::/32   1;

    # Allow internal health checks from Docker network
    # (Prometheus, load balancer probes that don't go through CF)
    172.16.0.0/12    1;
    10.0.0.0/8       1;
    127.0.0.1        1;
}
