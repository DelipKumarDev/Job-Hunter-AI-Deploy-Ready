# ══════════════════════════════════════════════════════════════
# Job Hunter AI — nginx Production Configuration
#
# Security posture:
#   • Cloudflare origin  — real-IP restored from CF-Connecting-IP
#                          direct-to-origin access blocked (non-CF IPs → 444)
#   • TLS               — 1.2 + 1.3 only; ECDHE/AES-GCM ciphers;
#                          HSTS preload; OCSP stapling
#   • Security headers  — CSP, Referrer-Policy, Permissions-Policy,
#                          HSTS, X-Frame-Options, X-Content-Type-Options
#   • Rate limiting     — keyed on real client IP (post-CF restore)
#                          login: 5/min  api: 30/min  webhook: 100/min
#   • Bot protection    — UA blocklist, empty-UA 444, scanner detection
#   • Request hygiene  — hidden server version, 20MB body limit,
#                          request-ID propagation, secure headers only
# ══════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Cloudflare real-IP restoration ────────────────────────
    # Restores the visitor's real IP from CF-Connecting-IP.
    # Must be before rate-limit zones so $binary_remote_addr is correct.
    include /etc/nginx/conf.d/cloudflare.conf;

    # ── Structured access log (Pino/Loki-compatible JSON) ─────
    # $realip_remote_addr = real visitor IP after CF restoration
    log_format main_json escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$realip_remote_addr",'
        '"cf_ray":"$http_cf_ray",'
        '"cf_country":"$http_cf_ipcountry",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"query":"$query_string",'
        '"status":"$status",'
        '"request_time":"$request_time",'
        '"upstream_time":"$upstream_response_time",'
        '"bytes_sent":"$bytes_sent",'
        '"request_id":"$request_id",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"}';

    access_log  /var/log/nginx/access.log  main_json;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    client_max_body_size 20M;

    # Never expose nginx version in Server header or error pages
    server_tokens off;
    more_clear_headers Server;   # nginx-module-headers-more (or use headers_more)

    # ── Compression ───────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/rss+xml font/woff2 image/svg+xml;

    # ── TLS hardening (shared across all SSL server blocks) ───
    # Protocols: TLS 1.2 and 1.3 only — 1.0 and 1.1 are deprecated
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Cipher suites: ECDHE forward-secrecy + AES-GCM/CHACHA20 AEAD
    # ORDER matters: TLS 1.3 suites are handled by OpenSSL separately
    # (these apply to TLS 1.2 connections only)
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;   # TLS 1.3 negotiates its own; let client prefer for TLS 1.2

    # Session resumption (reduces handshake cost)
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;    # Disable — breaks forward secrecy if ticket key leaks

    # OCSP stapling — nginx fetches and caches the OCSP response,
    # so clients don't need to contact the CA during handshake
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Rate-limiting zones ────────────────────────────────────
    # Key on $binary_remote_addr which is now the REAL visitor IP
    # (after CF real-IP restoration above), not the CF edge IP.
    # Without this, every user behind CF would share one counter.

    # Login / auth endpoints — 5 req/min per IP
    # Burst 2 allows brief spikes (e.g. token refresh on reconnect)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;

    # General API — 30 req/min per IP
    # Burst 15 covers legitimate rapid UI interactions (search-as-you-type)
    limit_req_zone $binary_remote_addr zone=api_limit:20m   rate=30r/m;

    # Webhooks (WhatsApp, Stripe, email providers) — 100 req/min
    # High limit because webhook providers send bursts
    limit_req_zone $binary_remote_addr zone=webhook_limit:5m rate=100r/m;

    # Concurrent connection limit (bot/DDoS protection)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return 429 Too Many Requests (not 503) on rate limit hit
    limit_req_status  429;
    limit_conn_status 429;

    # ── Bot protection — User-Agent blocklist ──────────────────
    # Maps known scanner / scraper UAs to $bad_bot = 1.
    # Server blocks return 444 (close connection, no response) for these.
    # 444 is preferred over 403 for bots — it reveals nothing about the server.
    map $http_user_agent $bad_bot {
        default                    0;

        # Empty or missing UA — no legitimate browser omits it
        ""                         1;
        "-"                        1;

        # Common vulnerability scanners
        ~*nikto                    1;
        ~*nmap                     1;
        ~*sqlmap                   1;
        ~*masscan                  1;
        ~*zgrab                    1;
        ~*nuclei                   1;
        ~*dirbuster                1;
        ~*gobuster                 1;
        ~*wfuzz                    1;
        ~*hydra                    1;
        ~*burpsuite                1;

        # Headless browser fingerprints (not our own Playwright — see note)
        # Our Playwright uses a realistic UA via puppeteer-extra-plugin-stealth.
        # These patterns match default/unstealth headless configs.
        ~*HeadlessChrome           1;
        ~*PhantomJS                1;
        ~*Selenium                 1;
        ~*python-requests          1;
        ~*Go-http-client           1;
        ~*libwww-perl              1;
        ~*curl\/[0-9]              1;   # raw curl (not browsers)
        ~*wget\/[0-9]              1;

        # Known credential-stuffing toolkits
        ~*SentryNordVPN            1;
        ~*DatadomeBot              1;
    }

    # Map to detect requests probing internal paths
    map $request_uri $suspicious_path {
        default                    0;
        ~*/\.env                   1;
        ~*/wp-admin                1;
        ~*/wp-login                1;
        ~*\.php$                   1;
        ~*/admin/config            1;
        ~*/etc/passwd              1;
        ~*/proc/self               1;
        ~*/cgi-bin/                1;
        ~*xmlrpc\.php              1;
        ~*actuator/                1;    # Spring Boot probes
        ~*/console                 1;
        ~*\.git/config             1;
    }

    # ── Upstream backends ─────────────────────────────────────
    upstream api_backend {
        server api:3001;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    upstream web_backend {
        server web:3000;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════
    # HTTP server — redirect all to HTTPS
    # Cloudflare handles the visitor HTTPS termination and sends
    # HTTP or HTTPS to origin depending on the SSL/TLS mode:
    #   Flexible: Cloudflare → origin on HTTP (DO NOT USE — MITM risk)
    #   Full:     Cloudflare → origin on HTTPS (recommended)
    #   Full(Strict): origin cert must be valid CA-signed (best)
    # ══════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Drop clearly bad bots immediately (no redirect overhead)
        if ($bad_bot)         { return 444; }
        if ($suspicious_path) { return 444; }

        # Cloudflare sends its own HTTPS-redirect, but we add one
        # here in case direct HTTP slips through
        return 301 https://$host$request_uri;
    }

    # ══════════════════════════════════════════════════════════
    # Web application — jobhunter.ai / www.jobhunter.ai
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name jobhunter.ai www.jobhunter.ai;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── Block direct-to-origin access ─────────────────────
        # Any IP that isn't Cloudflare gets 444 (silent close).
        # Comment this out if you need to test origin directly.
        if ($cloudflare_ip = 0) { return 444; }

        # ── Drop bots and scanners ────────────────────────────
        if ($bad_bot)         { return 444; }
        if ($suspicious_path) { return 444; }

        # ── Connection limits ─────────────────────────────────
        limit_conn conn_limit 20;

        # ── HSTS — tell browsers to always use HTTPS ──────────
        # max-age 2 years, include subdomains, submit to preload list
        # IMPORTANT: only enable preload if you're ready to commit ALL
        # subdomains to HTTPS forever. Removal takes months.
        add_header Strict-Transport-Security
            "max-age=63072000; includeSubDomains; preload" always;

        # ── Content-Security-Policy ───────────────────────────
        # Controls what resources the browser is allowed to load.
        # This policy is tailored for Next.js + Socket.IO + Stripe.
        #
        # 'unsafe-inline' in style-src: required by many CSS-in-JS
        # frameworks (Next.js inline <style> tags). Use nonces in a
        # future iteration to remove this.
        #
        # connect-src wss: allows Socket.IO WebSocket connections.
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-eval' https://js.stripe.com; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: https: blob:; "
            "connect-src 'self' https://api.jobhunter.ai wss://api.jobhunter.ai https://api.stripe.com; "
            "frame-src https://js.stripe.com https://hooks.stripe.com; "
            "frame-ancestors 'none'; "
            "object-src 'none'; "
            "base-uri 'self'; "
            "form-action 'self'; "
            "upgrade-insecure-requests"
            always;

        # ── Referrer-Policy ───────────────────────────────────
        # 'strict-origin-when-cross-origin': send full path within
        # same origin; send only origin on cross-origin HTTPS;
        # send nothing on cross-origin HTTP downgrade.
        # Balances analytics needs vs. privacy/security.
        add_header Referrer-Policy
            "strict-origin-when-cross-origin" always;

        # ── Permissions-Policy ────────────────────────────────
        # Explicitly disable browser features the app doesn't use.
        # Prevents malicious scripts from accessing sensitive APIs
        # even if they bypass CSP.
        add_header Permissions-Policy
            "camera=(), "
            "microphone=(), "
            "geolocation=(), "
            "payment=(self https://js.stripe.com), "
            "usb=(), "
            "accelerometer=(), "
            "gyroscope=(), "
            "magnetometer=(), "
            "ambient-light-sensor=(), "
            "autoplay=(), "
            "interest-cohort=()"
            always;

        # ── Standard security headers ─────────────────────────
        add_header X-Content-Type-Options  "nosniff"    always;
        add_header X-Frame-Options         "DENY"       always;
        add_header X-Request-ID            $request_id  always;

        # Cross-Origin policies (required for SharedArrayBuffer / performance APIs)
        add_header Cross-Origin-Opener-Policy   "same-origin"         always;
        add_header Cross-Origin-Embedder-Policy "require-corp"        always;
        add_header Cross-Origin-Resource-Policy "same-site"           always;

        # ── Static assets — aggressive caching ───────────────
        location /_next/static/ {
            proxy_pass http://web_backend;
            add_header Cache-Control "public, max-age=31536000, immutable";
            # No security headers on immutable static files (reduces bytes)
        }

        location /favicon.ico {
            proxy_pass http://web_backend;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # ── Main app ─────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $realip_remote_addr;
            proxy_set_header   X-Forwarded-For   $realip_remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header   CF-RAY            $http_cf_ray;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 60s;
            proxy_hide_header  X-Powered-By;
        }
    }

    # ══════════════════════════════════════════════════════════
    # API — api.jobhunter.ai
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.jobhunter.ai;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Block direct-to-origin access
        if ($cloudflare_ip = 0) { return 444; }

        if ($bad_bot)         { return 444; }
        if ($suspicious_path) { return 444; }

        limit_conn conn_limit 50;

        add_header Strict-Transport-Security
            "max-age=63072000; includeSubDomains; preload" always;

        # API responses are consumed by JS — restrictive CSP
        add_header Content-Security-Policy
            "default-src 'none'; frame-ancestors 'none'" always;

        add_header Referrer-Policy         "no-referrer"  always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header X-Frame-Options         "DENY"         always;
        add_header X-Request-ID            $request_id    always;

        # ── Proxy header helpers ──────────────────────────────
        # Defined once, reused across location blocks
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $realip_remote_addr;
        proxy_set_header X-Forwarded-For  $realip_remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Request-ID     $request_id;
        proxy_hide_header X-Powered-By;

        # ── Health check — no rate limit, no access log ───────
        location = /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # ── Prometheus metrics — internal networks only ───────
        # Grafana/Prometheus scrape this. Blocked from public internet
        # by the $cloudflare_ip check above + Docker internal network.
        location = /metrics {
            proxy_pass http://api_backend/metrics;
            access_log off;
        }

        # ── Login / Auth — 5 req/min, burst 2 ────────────────
        # Covers: POST /auth/login, POST /auth/refresh, POST /auth/register
        # burst=2 allows a quick token refresh + login without triggering
        # the limit, but prevents credential stuffing loops
        location ~ ^/auth/ {
            limit_req zone=auth_limit burst=2 nodelay;

            proxy_pass       http://api_backend;
            proxy_read_timeout 30s;
        }

        # ── Webhooks — 100 req/min, burst 50 ──────────────────
        # WhatsApp, Stripe, and email providers send bursts of events.
        # Higher limit; they authenticate via HMAC signature not IP.
        location ~ ^/webhooks/ {
            limit_req zone=webhook_limit burst=50 nodelay;

            proxy_pass         http://api_backend;
            proxy_read_timeout 30s;

            # Webhooks may contain raw request bodies (HMAC check)
            proxy_request_buffering on;
        }

        # ── SSE / WebSocket real-time streams ─────────────────
        # Long-lived connections for job status updates.
        # No rate limit here — each authenticated user has one stream.
        location ~ ^/api/v1/(notifications|events)/stream {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_send_timeout 3600s;
        }

        # ── All other API routes — 30 req/min, burst 15 ───────
        location / {
            limit_req zone=api_limit burst=15 nodelay;

            proxy_pass         http://api_backend;
            proxy_read_timeout 120s;
        }
    }

    # ══════════════════════════════════════════════════════════
    # Catch-all — reject everything else
    # Covers: unknown SNI, direct-IP access, port scans
    # 444 closes the connection without sending any response.
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;

        # Self-signed cert for the default_server block.
        # Clients never see it (connection closes before TLS completes).
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        server_name _;
        return 444;
    }
    # ── nginx-exporter stub_status (internal metrics only) ───
    # Bound to 8080, accessible only within Docker network.
    # nginx-exporter scrapes http://nginx:8080/stub_status
    server {
        listen 8080;
        server_name localhost;
        access_log off;

        location = /stub_status {
            stub_status;
            allow 172.16.0.0/12;   # Docker internal networks
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny  all;
        }

        location = /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
            access_log off;
        }
    }

}
