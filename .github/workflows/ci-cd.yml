# ══════════════════════════════════════════════════════════════
# Job Hunter AI — CI/CD Pipeline
# GitHub Actions: test → build → push ECR → deploy EC2
#
# Triggered on:
#   push to main       → full pipeline (staging deploy)
#   push to release/*  → full pipeline (production deploy)
#   pull_request       → lint + test only (no deploy)
#   manual dispatch    → full pipeline (choose environment)
# ══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: staging
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        type: boolean
        default: false

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_PREFIX: job-hunter

jobs:

  # ── 1: Lint & Type-check ────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type-check
        run: npm run typecheck --workspaces --if-present

      - name: Prisma validate
        run: npx prisma validate --schema=packages/database/prisma/schema.prisma

  # ── 2: Tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobhunter_test
          POSTGRES_USER: jhuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jhuser:testpass@localhost:5432/jobhunter_test
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      JWT_SECRET: test-jwt-secret-not-for-production
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Run unit tests
        run: npm run test:unit --workspaces --if-present -- --coverage

      - name: Run integration tests
        run: npm run test:integration --workspaces --if-present
        timeout-minutes: 10

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 3: Build & Push Docker images ──────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name != 'pull_request'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      api-image: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.meta.outputs.version }}
      web-image: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.meta.outputs.version }}

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: infrastructure/docker/Dockerfile.api
            image: job-hunter-api
          - service: web
            dockerfile: infrastructure/docker/Dockerfile.web
            image: job-hunter-web
          - service: bot
            dockerfile: infrastructure/docker/Dockerfile.bot
            image: job-hunter-worker-bot
          - service: scraper
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-scraper
            build-arg: WORKER=scraper
          - service: ai
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-ai
            build-arg: WORKER=ai
          - service: email
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-email
            build-arg: WORKER=email
          - service: notification
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-notification
            build-arg: WORKER=notification
          - service: resume
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-resume
            build-arg: WORKER=resume
          - service: prep
            dockerfile: infrastructure/docker/Dockerfile.worker
            image: job-hunter-worker-prep
            build-arg: WORKER=prep

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-arg || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # Don't block on vuln scan; we'll review separately

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── 4: Deploy to Staging ────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.jobhunter.ai

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ubuntu
          key:      ${{ secrets.STAGING_SSH_KEY }}
          envs:     IMAGE_TAG,ECR_REGISTRY,AWS_REGION
          script: |
            set -e

            echo "🔐 Logging in to ECR..."
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "📦 Pulling latest images..."
            cd /opt/job-hunter-ai

            # Update .env with new image tag
            sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env.staging

            # Pull all updated images
            export IMAGE_TAG=$IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull --quiet

            echo "🚀 Rolling restart (zero-downtime)..."
            # Restart web/api first with health checks
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait web
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait api

            # Restart workers (can have brief downtime — BullMQ handles it)
            docker compose -f docker-compose.prod.yml up -d --no-deps \
              worker-scraper worker-ai worker-email worker-notification \
              worker-resume worker-prep worker-bot

            echo "🧹 Pruning old images..."
            docker image prune -f --filter "until=24h"

            echo "✅ Staging deploy complete — tag: $IMAGE_TAG"

      - name: Run smoke tests
        run: |
          sleep 15
          curl -f https://staging.jobhunter.ai/api/health || exit 1
          curl -f https://api.staging.jobhunter.ai/health || exit 1
          echo "✅ Smoke tests passed"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Staging deploy *${{ job.status }}* — `${{ needs.build.outputs.image-tag }}` by @${{ github.actor }}",
              "blocks": [{
                "type": "section",
                "text": { "type": "mrkdwn", "text": "${{ job.status == 'success' && '✅' || '❌' }} *Staging* `${{ needs.build.outputs.image-tag }}` — ${{ github.event.head_commit.message }}" }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── 5: Deploy to Production ─────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: production
      url: https://jobhunter.ai

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create database backup before deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            BACKUP_FILE="/opt/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            docker exec jh-postgres pg_dump \
              -U $POSTGRES_USER $POSTGRES_DB \
              | gzip > "$BACKUP_FILE"
            aws s3 cp "$BACKUP_FILE" s3://${{ secrets.AWS_S3_BUCKET }}/backups/
            echo "✅ Backup uploaded: $BACKUP_FILE"

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          envs:     IMAGE_TAG,ECR_REGISTRY
          script: |
            set -e
            docker run --rm \
              --env-file /opt/job-hunter-ai/.env \
              $ECR_REGISTRY/job-hunter-api:$IMAGE_TAG \
              npx prisma migrate deploy --schema=./prisma/schema.prisma
            echo "✅ Migrations applied"

      - name: Deploy to production EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          envs:     IMAGE_TAG,ECR_REGISTRY,AWS_REGION
          script: |
            set -e
            cd /opt/job-hunter-ai

            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env

            docker compose -f docker-compose.prod.yml pull --quiet

            # Zero-downtime: update web + api first with health checks
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait --wait-timeout 60 web api

            # Workers restart gracefully (BullMQ drains in-flight jobs)
            docker compose -f docker-compose.prod.yml up -d --no-deps \
              worker-scraper worker-ai worker-email worker-notification \
              worker-resume worker-prep worker-bot

            docker image prune -f --filter "until=48h"

            echo "✅ Production deploy complete — $IMAGE_TAG"

      - name: Production smoke tests
        run: |
          sleep 20
          curl -f https://jobhunter.ai/api/health    || exit 1
          curl -f https://api.jobhunter.ai/health    || exit 1
          echo "✅ Production smoke tests passed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ needs.build.outputs.image-tag }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🚨' }} Production deploy *${{ job.status }}* — `${{ needs.build.outputs.image-tag }}`",
              "blocks": [{
                "type": "section",
                "text": { "type": "mrkdwn", "text": "${{ job.status == 'success' && '🚀' || '🚨' }} *Production* `${{ needs.build.outputs.image-tag }}` — ${{ github.event.head_commit.message }}\n*Deployed by:* ${{ github.actor }}" }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── 6: Rollback ──────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: deploy-production
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          envs:     ECR_REGISTRY,AWS_REGION
          script: |
            set -e
            cd /opt/job-hunter-ai
            PREV_TAG=$(cat .previous-image-tag)
            echo "⏪ Rolling back to $PREV_TAG..."
            sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait web api
            docker compose -f docker-compose.prod.yml up -d --no-deps \
              worker-scraper worker-ai worker-email worker-notification \
              worker-resume worker-prep worker-bot
            echo "✅ Rollback complete"

      - name: Notify Slack on rollback
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"⏪ *Production ROLLED BACK* — deploy failed, reverted to previous version. Investigate immediately."}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
