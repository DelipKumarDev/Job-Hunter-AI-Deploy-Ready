version: '3.9'

# ============================================================
# JOB HUNTER AI AGENT — Docker Compose (Base)
# Usage:
#   Dev:  docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-development}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  AWS_REGION: ${AWS_REGION}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
  JWT_SECRET: ${JWT_SECRET}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-worker-base: &worker-base
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - job-hunter-net
  environment:
    <<: *common-env

networks:
  job-hunter-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobhunterdb
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunter -d jobhunterdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - job-hunter-net
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c log_min_duration_statement=1000

  redis:
    image: redis:7-alpine
    container_name: jh-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-password}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - job-hunter-net

  minio:
    image: minio/minio:latest
    container_name: jh-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - job-hunter-net

  # ── API GATEWAY ─────────────────────────────────────────

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: jh-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 4000
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./services/api:/app
      - /app/node_modules
    networks:
      - job-hunter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── WEB APP ─────────────────────────────────────────────

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: jh-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - job-hunter-net

  # ── WORKERS ─────────────────────────────────────────────

  worker-scraper:
    build:
      context: ./services/worker-scraper
      dockerfile: Dockerfile
    container_name: jh-worker-scraper
    <<: *worker-base
    environment:
      <<: *common-env
      PROXY_HOST: ${PROXY_HOST}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-3}
    volumes:
      - ./services/worker-scraper:/app
      - /app/node_modules
    cap_add:
      - SYS_ADMIN  # Required for Playwright

  worker-bot:
    build:
      context: ./services/worker-bot
      dockerfile: Dockerfile
    container_name: jh-worker-bot
    <<: *worker-base
    environment:
      <<: *common-env
      PROXY_HOST: ${PROXY_HOST}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      BOT_CONCURRENCY: ${BOT_CONCURRENCY:-2}
      BOT_MIN_DELAY_MS: ${BOT_MIN_DELAY_MS:-800}
      BOT_MAX_DELAY_MS: ${BOT_MAX_DELAY_MS:-3000}
    volumes:
      - ./services/worker-bot:/app
      - /app/node_modules
    cap_add:
      - SYS_ADMIN  # Required for Playwright
    shm_size: '2gb'   # Chromium needs shared memory

  worker-ai:
    build:
      context: ./services/worker-ai
      dockerfile: Dockerfile
    container_name: jh-worker-ai
    <<: *worker-base
    environment:
      <<: *common-env
      ANTHROPIC_MODEL_FAST: ${ANTHROPIC_MODEL_FAST}
      ANTHROPIC_MODEL_SMART: ${ANTHROPIC_MODEL_SMART}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-4096}
      AI_MATCH_CONCURRENCY: ${AI_MATCH_CONCURRENCY:-10}

  worker-email:
    build:
      context: ./services/worker-email
      dockerfile: Dockerfile
    container_name: jh-worker-email
    <<: *worker-base
    environment:
      <<: *common-env
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      EMAIL_MONITOR_CONCURRENCY: ${EMAIL_MONITOR_CONCURRENCY:-5}

  worker-notification:
    build:
      context: ./services/worker-notification
      dockerfile: Dockerfile
    container_name: jh-worker-notification
    <<: *worker-base
    environment:
      <<: *common-env
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      NOTIFICATION_CONCURRENCY: ${NOTIFICATION_CONCURRENCY:-20}

  # ── OBSERVABILITY ────────────────────────────────────────

  bull-board:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: jh-bull-board
    restart: unless-stopped
    depends_on:
      - redis
    command: node src/bull-board.js
    environment:
      REDIS_URL: ${REDIS_URL}
      BULL_BOARD_USERNAME: ${BULL_BOARD_USERNAME:-admin}
      BULL_BOARD_PASSWORD: ${BULL_BOARD_PASSWORD:-changeme}
      PORT: 4001
    ports:
      - "4001:4001"
    networks:
      - job-hunter-net

  nginx:
    image: nginx:alpine
    container_name: jh-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - job-hunter-net
